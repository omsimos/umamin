name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      matrix:
        node-version: [24]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        env:
          TURSO_CONNECTION_URL: ${{ secrets.TURSO_CONNECTION_URL }}
        run: pnpm build

  typecheck:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm check-types

  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  quality:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.16

      - name: Run Biome
        run: biome ci .

  release:
    name: Release
    needs: [build, typecheck, test, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract latest changelog entry
        id: rel
        run: |
          HEADING=$(grep -m1 -E '^## \[[^]]+\]' CHANGELOG.md)
          if [ -z "$HEADING" ]; then
            echo "::error::No '## [version]' heading found in CHANGELOG.md"
            exit 1
          fi
          VERSION=$(printf '%s\n' "$HEADING" | sed -E 's/^## \[([^]]+)\].*/\1/')
          DATE=$(printf '%s\n' "$HEADING" | sed -E 's/^## \[[^]]+\][[:space:]]*-[[:space:]]*([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/')
          # Only keep a strict YYYY-MM-DD date; otherwise the title falls back to the tag.
          case "$DATE" in
            [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]) ;;
            *) DATE="" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # Body = everything under the top entry, up to the next entry or the
          # reference-link block; strip leading blank lines.
          awk 'f && /^## \[/ {exit} f && /^\[[^]]+\]: https?:/ {exit} /^## \[/ {f=1; next} f {print}' CHANGELOG.md \
            | sed '/./,$!d' > RELEASE_BODY.md
          echo "Latest changelog version: $VERSION ($DATE)"
          echo "----- notes -----"
          cat RELEASE_BODY.md

      - name: Create GitHub release if tag is new
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.rel.outputs.version }}
          RELEASE_DATE: ${{ steps.rel.outputs.date }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists — no release needed."
            exit 0
          fi
          # Match the existing title convention: "vX.Y.Z (Mon D, YYYY)".
          TITLE="$TAG"
          if [ -n "$RELEASE_DATE" ]; then
            DISPLAY_DATE=$(date -d "$RELEASE_DATE" "+%b %-d, %Y" 2>/dev/null || true)
            [ -n "$DISPLAY_DATE" ] && TITLE="$TAG ($DISPLAY_DATE)"
          fi
          PRERELEASE=""
          case "$VERSION" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$TAG" \
            --target "$TARGET_SHA" \
            --title "$TITLE" \
            --notes-file RELEASE_BODY.md \
            $PRERELEASE
          echo "Published $TITLE"
